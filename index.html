<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      try {
        var v = localStorage.getItem('anssh-theme') || localStorage.getItem('nexterm-theme');
        document.documentElement.classList.toggle('dark', v !== 'light');
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnSSH — SSH & Ansible</title>
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/renderer/main.tsx"></script>
</body>
</html>
